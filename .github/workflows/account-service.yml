name: Account-Service-CI
 
on:
  push:
    paths:
      - 'services/account-service/**'
      - 'services/shared/**'
  pull_request:
    paths:
      - 'services/account-service/**'
      - 'services/shared/**'
  workflow_dispatch:
 
jobs:
  build:
    name: CI - account-service
    runs-on: ubuntu-latest
 
    permissions:
      contents: write
      packages: read
 
    defaults:
      run:
        working-directory: services/account-service
 
    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}
      should_push: ${{ steps.image_tag.outputs.push }}
      semver_tag: ${{ steps.semver.outputs.new_tag }}
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('services/account-service/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
 
      # -------- VERSIONING --------
      - name: Calculate Semantic Version (main only)
        id: semver
        if: github.ref == 'refs/heads/main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          dry_run: true
          default_bump: patch
          tag_prefix: 'v'
 
      - name: Resolve Image Tag
        id: image_tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=${{ steps.semver.outputs.new_tag }}" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "push=false" >> $GITHUB_OUTPUT
          fi
 
      # -------- NODE SETUP --------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install dependencies
        run: npm ci || npm install
 
      - name: Auto-fix package-lock.json
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain package-lock.json)" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: auto-sync package-lock.json [skip ci]"
            git push
          fi
 
      # -------- TEST --------
      - name: Run Tests
        run: npm test
 
      # -------- SONAR --------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
 
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: ./.scannerwork/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
 
      # -------- SNYK --------
      - name: Snyk Scan
        uses: snyk/actions/node@0.4.0
        with:
          command: test
          args: --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
 
      # -------- DOCKER BUILD --------
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      - name: Build Docker Image
        working-directory: services
        run: |
          echo "${{ github.token }}" > npm_token.txt
          docker build \
            -f account-service/Dockerfile \
            --secret id=npm_token,src=npm_token.txt \
            -t ${{ secrets.DOCKER_USERNAME }}/account-service:${{ steps.image_tag.outputs.tag }} \
            .
          rm -f npm_token.txt
 
      # -------- TRIVY --------
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/account-service:${{ steps.image_tag.outputs.tag }}'
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
 
      # -------- SAVE IMAGE --------
      - name: Save Docker Image
        if: steps.image_tag.outputs.push == 'true'
        run: |
          docker save ${{ secrets.DOCKER_USERNAME }}/account-service:${{ steps.image_tag.outputs.tag }} -o image.tar
 
      - name: Upload Artifact
        if: steps.image_tag.outputs.push == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: account-service-image
          path: image.tar
 
  prod-gate:
    name: Approval & Push
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: gate
 
    steps:
      - name: Await Approval
        run: echo "Waiting for manual approval..."
 
      # -------- DOWNLOAD IMAGE --------
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: account-service-image
 
      - name: Load Docker Image
        run: docker load -i image.tar
 
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      # -------- PUSH IMAGE --------
      - name: Push Docker Image
        if: needs.build.outputs.should_push == 'true'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/account-service:${{ needs.build.outputs.image_tag }}
 
          docker tag ${{ secrets.DOCKER_USERNAME }}/account-service:${{ needs.build.outputs.image_tag }} \
                     ${{ secrets.DOCKER_USERNAME }}/account-service:latest
 
          docker push ${{ secrets.DOCKER_USERNAME }}/account-service:latest
 
      # -------- GIT TAG --------
      - name: Create Git Tag
        if: needs.build.outputs.should_push == 'true'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          custom_tag: ${{ needs.build.outputs.semver_tag }}
          tag_prefix: ''
 
      # -------- EMAIL --------
      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Success - account-service"
          body: |
            Build & Push Successful
 
            Tag: ${{ needs.build.outputs.image_tag }}
            Repo: ${{ github.repository }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
 
      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Failed - account-service"
          body: |
            Pipeline Failed
 
            Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions