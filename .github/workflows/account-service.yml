name: Account-Service-CI

on:
  push:
    paths:
      - 'services/account-service/**'
      - 'services/shared/**'
  pull_request:
    paths:
      - 'services/account-service/**'
      - 'services/shared/**'
  workflow_dispatch:
    

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/account-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: services/account-service/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('services/account-service/package-lock.json') }}


      - name: Install dependencies
        run: npm install


      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: frontend/.scannerwork/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Snyk Scan
        uses: snyk/actions/node@master
        with:
          command: test
          # uses: actions run at workspace root, NOT in defaults.run.working-directory
          args: --file=services/account-service/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build (optional)
        run: npm run build || echo "No build step"

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        working-directory: services
        run: docker build -f account-service/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/account-service:latest .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/account-service:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/account-service:latest
